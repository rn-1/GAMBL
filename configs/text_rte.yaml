# RTE (GLUE Recognizing Textual Entailment)
# Binary NLI: sentence1 + sentence2 → entailment / not_entailment
# HF train split: 2490 examples — small enough for full-batch grokking runs.
base_config: configs/base.yaml
dataset: text
hf_dataset: rte
tokenizer_name: bert-base-uncased
max_seq_len: 128
pool: mean
n_steps: 50000
batch_size: -1        # full-batch (2490 examples)
weight_decay: 1.0
lr: 0.001
