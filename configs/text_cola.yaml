# CoLA (GLUE Corpus of Linguistic Acceptability)
# Binary: sentence → grammatically acceptable / unacceptable
# HF train split: 8551 examples.
base_config: configs/base.yaml
dataset: text
hf_dataset: cola
tokenizer_name: bert-base-uncased
max_seq_len: 64       # CoLA sentences are short; 64 tokens is sufficient
pool: mean
n_steps: 50000
batch_size: -1        # full-batch (8551 examples)
weight_decay: 1.0
lr: 0.001
