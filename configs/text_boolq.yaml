# BoolQ (Boolean Question Answering)
# Binary: question + passage → yes / no
# HF train split: 9427 examples.
# Note: passages are long; truncation to max_seq_len=256 discards some context.
base_config: configs/base.yaml
dataset: text
hf_dataset: boolq
tokenizer_name: bert-base-uncased
max_seq_len: 256      # longer to capture more of the passage
pool: mean
n_steps: 50000
batch_size: 128       # mini-batch to keep GPU memory reasonable at seq_len=256
weight_decay: 1.0
lr: 0.001
